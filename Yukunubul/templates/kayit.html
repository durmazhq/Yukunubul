<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol - YükünüBul</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f5f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .register-card { background: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 450px; }
        h2 { text-align: center; color: #111; margin-bottom: 20px; font-weight: 600; }
        .input-group { margin-bottom: 14px; }
        label { display: block; margin-bottom: 6px; color: #555; font-size: 14px; }
        input, select { width: 100%; padding: 11px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        .btn { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn:hover { background: #218838; }
        .link-text { text-align: center; margin-top: 15px; font-size: 14px; }
        .link-text a { color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="register-card">
        <h2>Lojistik Ağına Katıl</h2>
        <form method="POST">
            <div class="input-group">
                <label>Ad Soyad / Yetkili İsim</label>
                <input type="text" name="isim" placeholder="Mertcan Durmaz" required>
            </div>
            <div class="input-group">
                <label>E-Posta Adresi</label>
                <input type="email" name="email" placeholder="holding@durmaz.com" required>
            </div>
            <div class="input-group">
                <label>Telefon Numarası</label>
                <input type="tel" name="telefon" placeholder="05551234567" required>
            </div>
            <div class="input-group">
                <label>Kullanıcı Tipi</label>
                <select name="tip">
                    <option value="Taşıyıcı (Bireysel Nakliyeci)">Taşıyıcı (Bireysel Nakliyeci)</option>
                    <option value="Şirket (Yük Veren Firma)">Şirket (Yük Veren Firma)</option>
                </select>
            </div>
            <div class="input-group">
                <label>Firma Adı / Araç Plakası</label>
                <input type="text" name="detay" placeholder="Durmaz Lojistik veya 34 ABC 123" required>
            </div>
            <div class="input-group">
                <label>T.C. Kimlik / Vergi No</label>
                <input type="text" name="kimlik_no" placeholder="11 Haneli No" required>
            </div>
            <div class="input-group">
                <label>Güvenli Şifre</label>
                <input type="password" name="sifre" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn">Hesabımı Oluştur</button>
        </form>
        <div class="link-text">Zaten üye misin? <a href="/giris">Giriş Yap</a></div>
    </div>
</body>
</html>
