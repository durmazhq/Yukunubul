<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YükünüBul - Giriş Yap</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #f8fafc; margin: 0; padding: 40px 20px; display: flex; justify-content: center; align-items: center; min-height: 80vh; }
        .form-panel { background: white; padding: 40px; border-radius: 12px; max-width: 400px; width: 100%; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        h2 { margin-top: 0; color: #0f172a; text-align: center; margin-bottom: 25px; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #334155; font-size: 14px; }
        input { width: 100%; padding: 12px; margin-top: 6px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        input:focus { border-color: #10b981; outline: none; }
        button { width: 100%; background-color: #10b981; color: white; padding: 14px; border: none; border-radius: 6px; margin-top: 25px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.2s; }
        button:hover { background-color: #059669; }
        .login-link { display: block; text-align: center; margin-top: 20px; color: #64748b; text-decoration: none; font-size: 14px; font-weight: 600; }
        .login-link:hover { color: #0f172a; }
        .hata { background: #fee2e2; color: #b91c1c; padding: 10px; border-radius: 6px; font-size: 14px; text-align: center; margin-bottom: 15px; }
    </style>
</head>
<body>
<div class="form-panel">
    <h2>Hoş Geldin</h2>
    {% if hata %} <div class="hata">{{ hata }}</div> {% endif %}
    <form action="/giris" method="POST">
        <label>Telefon Numaranız:</label>
        <input type="text" name="telefon" required placeholder="Örn: 0555... veya 'patron'">
        <label>Şifreniz:</label>
        <input type="password" name="sifre" required placeholder="Şifrenizi girin">
        <button type="submit">Güvenli Giriş Yap</button>
    </form>
    <a href="/kayit" class="login-link">Hesabın yok mu? Bize Katıl ➔</a>
    <a href="/" class="login-link" style="margin-top: 10px;">◀ Ana Sayfaya Dön</a>
</div>
</body>
</html>
