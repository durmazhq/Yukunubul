<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Giriş Yap - YükünüBul</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script> <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f5f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; padding: 10px; box-sizing: border-box; }
        .login-card { background: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #111; margin-bottom: 24px; font-weight: 600; }
        .input-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; color: #555; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        .btn { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn:hover { background: #0056b3; }
        .error { color: #dc3545; text-align: center; margin-bottom: 15px; font-size: 14px; }
        .divider { text-align: center; margin: 20px 0; color: #888; position: relative; }
        .divider::before { content: ""; position: absolute; left: 0; top: 50%; width: 40%; border-bottom: 1px solid #ddd; }
        .divider::after { content: ""; position: absolute; right: 0; top: 50%; width: 40%; border-bottom: 1px solid #ddd; }
        .google-box { display: flex; justify-content: center; margin-top: 15px; }
        .link-text { text-align: center; margin-top: 15px; font-size: 14px; }
        .link-text a { color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>YükünüBul Kontrol Kulesi</h2>
        {% if hata %} <div class="error">{{ hata }}</div> {% endif %}
        
        <form method="POST">
            <div class="input-group">
                <label>E-Posta Adresi veya Telefon Numarası</label>
                <input type="text" name="telefon_veya_email" placeholder="ornek@mail.com veya 0555..." required>
            </div>
            <div class="input-group">
                <label>Şifre</label>
                <input type="password" name="sifre" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn">Giriş Yap</button>
        </form>

        <div class="divider">veya</div>

        <div class="google-box">
            <div id="g_id_onload"
                 data-client_id="{{ google_client_id }}"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleCredentialResponse"
                 data-auto_select="false">
            </div>
            <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="outline" data-text="signin_with" data-size="large"></div>
        </div>

        <div class="link-text">Hesabın yok mu? <a href="/kayit">Hemen Kaydol</a></div>
    </div>

    <script>
        function handleCredentialResponse(response) {
            fetch('/login-with-google', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id_token: response.credential })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) { window.location.href = data.redirect; }
                else { alert("Google girişinde hata: " + data.message); }
            });
        }
    </script>
</body>
</html>
